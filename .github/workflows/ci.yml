name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel an in-flight run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build-test:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck && npx convex codegen

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          APP_ORIGIN: 'http://localhost:3000'
          S3_REGION: 'us-east-1'
          S3_BUCKET: 'ccverse-storage'
          SES_REGION: 'us-east-1'
          SES_SENDER_DOMAIN: 'ccverse.local'
          SES_CONFIGURATION_SET: 'ccverse-default'
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-session-secret-32-chars' }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT || '' }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY || '' }}

      # NOTE: Production Convex deployment (`npx convex deploy --prod`) is
      # intentionally NOT run from this CI pipeline. The deploy step requires
      # a human-approved credentials rotation and is run from a separate
      # release workflow. See docs/migration/convex-migration-plan-v2.md
      # §"P1-7 CI update" for the rationale.
