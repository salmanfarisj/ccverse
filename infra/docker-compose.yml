# Local development infrastructure (Phase 0).
#
# This file is the *only* docker-compose source for CC Verse. Later
# tasks add MinIO (T0-5-3) and Caddy (T0-11-1) as additional services
# to this same file. There is no `infra/prod/` or `infra/staging/`
# compose file — production runs on the host (single Next.js process,
# single managed Postgres) without Compose.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d db,minio
#   docker compose -f infra/docker-compose.yml down           # stop
#   docker compose -f infra/docker-compose.yml down -v        # nuke the volume
#   docker compose -f infra/docker-compose.yml logs -f db
#   docker compose -f infra/docker-compose.yml logs -f minio
#
# Connection details match the root `.env.example`:
#   DATABASE_URL=postgresql://ccverse:ccverse@localhost:5432/ccverse?schema=public
#   S3_ENDPOINT=http://localhost:9000
#   S3_FORCE_PATH_STYLE=true

services:
  db:
    image: postgres:16-alpine
    container_name: ccverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccverse
      POSTGRES_PASSWORD: ccverse
      POSTGRES_DB: ccverse
    ports:
      # Bind to localhost only — the proxy and the app both reach
      # the DB through this port in local dev. In production the
      # Next.js process reaches a managed Postgres over the private
      # network instead.
      - '127.0.0.1:5432:5432'
    volumes:
      - ccverse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` is the canonical Postgres liveness check.
      test:
        - CMD-SHELL
        - pg_isready -U ccverse -d ccverse
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: ccverse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '127.0.0.1:9000:9000' # API
      - '127.0.0.1:9001:9001' # Console
    volumes:
      - ccverse-minio-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && mc ready local
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ccverse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    # Bootstrap script creates the four CC Verse buckets and applies CORS.
    # CORS: allow GET + PUT from APP_ORIGIN only. Expose ETag header.
    command: |
      -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/ccverse-kyc;
      mc mb --ignore-existing local/ccverse-projects;
      mc mb --ignore-existing local/ccverse-certificates;
      mc mb --ignore-existing local/ccverse-audit-exports;
      mc anonymous set-json cors.json local/ccverse-kyc;
      mc anonymous set-json cors.json local/ccverse-projects;
      mc anonymous set-json cors.json local/ccverse-certificates;
      mc anonymous set-json cors.json local/ccverse-audit-exports;
      mc anonymous set-json cors.json local/;
      echo 'MinIO bootstrap complete';
      "
    volumes:
      - ./minio-cors.json:/cors.json:ro

volumes:
  ccverse-postgres-data:
    name: ccverse-postgres-data
  ccverse-minio-data:
    name: ccverse-minio-data
